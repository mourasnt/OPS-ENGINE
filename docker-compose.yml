version: "3.8"

# --------------------------------------------------------------------
# DEFINIÇÃO "BASE" DA APLICAÇÃO (para não repetir código)
# --------------------------------------------------------------------
x-app-base: &app-base
  build: .
  image: ops-engine-app:1.0
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
  volumes:
    - ./logs:/app/logs
    - ./utils/config.json:/app/utils/config.json
    - ./dados/credentials.json:/app/dados/credentials.json
  environment:
    - RPA_USUARIO=${RPA_USUARIO}
    - RPA_SENHA=${RPA_SENHA}
    - GOOGLE_APPLICATION_CREDENTIALS={GOOGLE_APPLICATION_CREDENTIALS}
    - REDIS_HOST={REDIS_HOST}
    - REDIS_PORT={REDIS_PORT}
  networks:
    - ops-engine-network

services:
  # --------------------------------------------------------------------
  # SERVIÇO 1: O POLLER (O Cérebro - Lê Planilha, avalia regras e cria filas)
  # --------------------------------------------------------------------
  poller:
    <<: *app-base 
    container_name: ops-engine-poller
    command: python poller.py

  # --------------------------------------------------------------------
  # SERVIÇO 2: O WRITER (Único com permissão de escrita)
  # --------------------------------------------------------------------
  writer:
    <<: *app-base 
    container_name: ops-engine-writer
    command: python writer.py

  # --------------------------------------------------------------------
  # SERVIÇO 3: OS WORKERS (Os Músculos - Web/Playwright e APIs de Risco)
  # --------------------------------------------------------------------
  workers:
    <<: *app-base 
    container_name: ops-engine-workers
    command: python main.py
    # Necessário para o Playwright não estourar a memória RAM compartilhada do container
    shm_size: '2gb' 

  # --------------------------------------------------------------------
  # SERVIÇO 4: O REDIS (Mensageria e Banco de Estado/Cache)
  # --------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ops-engine-redis
    restart: unless-stopped
    volumes:
      - ops-engine-redis-data:/data
    networks:
      - ops-engine-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ops-engine-redis-data:
    driver: local

# --------------------------------------------------------------------
# REDES
# --------------------------------------------------------------------
networks:
  ops-engine-network:
    driver: bridge
  raster-api_rede-raster-services:
    external: true